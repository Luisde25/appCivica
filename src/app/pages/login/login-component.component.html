<div class="login-container">

  <!-- Imagen ciudad + Metro Medellín -->
  <div class="top-background">

    <div class="green-overlay"></div>

    <img
      class="city-image"
      src="https://static-uat.cambiocolombia.com/s3fs-public/2022-12/metro_de_medellin_12122022.jpg"
      alt="Metro de Medellín"
    />

  </div>

  <!-- Card Login -->
  <div class="login-card">

    <!-- Logo -->
    <img
      class="logo"
      src="https://images.sftcdn.net/images/t_app-icon-m/p/2e4cac98-986a-44d5-b98d-8306d60c51be/2844958574/metro-de-medellin-aplicacion-logo"
      alt="Metro de Medellín"
    />

    <h1>App Cívica</h1>

    <p class="subtitle">
      Muévete por Medellín de forma inteligente
    </p>

    <!-- Tipo documento -->
    <div class="form-group">

      <label>Tipo de documento</label>

      <select>
        <option>Cédula de ciudadanía</option>
        <option>Tarjeta de identidad</option>
        <option>Cédula de extranjería</option>
      </select>

    </div>

    <!-- Documento -->
    <div class="form-group">

      <label>Número de documento</label>

      <input
        type="text"
        placeholder="Ingresa tu documento"
      />

    </div>

    <!-- Password -->
    <div class="form-group">

      <label>Contraseña</label>

      <input
        type="password"
        placeholder="********"
      />

    </div>

    <!-- Botón -->
    <button
      class="login-btn"
      (click)="isReactive()"
    >
      Ingresar
    </button>

    <!-- Link -->
    <div class="forgot-password">
      ¿Olvidaste tu contraseña?
    </div>

  </div>

</div>
